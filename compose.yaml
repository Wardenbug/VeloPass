services:
  velopass.presentation:
    image: velopass.presentation
    build:
      context: .
      dockerfile: src/VeloPass.Presentation/Dockerfile
    ports:
      - 5000:8080
      - 5001:8081      
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://velopass.aspire-dashboard:18889
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      
  velopass.aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: true
    ports:
      - 18888:18888
  